[Easter]
; You can use absolute paths:
; ExeA=C:/MyTools/locker_a.exe
; ExeB=C:/MyTools/locker_b.exe
;
; Or relative paths from the app folder (recommended):
ExeA=easter_a.exe
ExeB=easter_b.exe

; Sponsor button behavior:
; Modes: none | exe | gif | url | random_gif_or_none | random_exe_or_none | random_gif_or_exe
SponsorA_Mode=gif
SponsorA_Exe=sponsor_a.exe
SponsorA_Gif=cat-eating-chips-windows-xp-meme.gif
SponsorA_Url=https://example.com/a

SponsorB_Mode=url
SponsorB_Exe=sponsor_b.exe
SponsorB_Gif=cat-eating-chips-windows-xp-meme.gif
SponsorB_Url=https://github.com/Lavoris-Sec

; Hidden sponsor C link (triggered by invisible corner button)
SponsorC_Url=https://example.com/c

; Random router for Sponsor A:
; when true, Sponsor A opens one random link from SponsorA_Url/SponsorB_Url/SponsorC_Url.
; Toggle in runtime: Ctrl+Q
SponsorShuffleEnabled=false

; Hotkeys (fixed in app):
; Ctrl+E Encrypt, Ctrl+D Decrypt, Ctrl+W Swap, Ctrl+L Language menu
; Ctrl+1..5 switch tabs (Settings is Ctrl+4, About is Ctrl+5), F1 opens About

[Splash]
; Reserved for future use
Enabled=true
DurationMs=2000
